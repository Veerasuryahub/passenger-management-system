<div class="container">



<h1 class="title">

US005 - View All Passengers

</h1>


<p class="subtitle">

Passenger Records Stored In LocalStorage

</p>





<div class="card">



<div class="table-container">



<table>



<thead>



<tr>

<th>PNR</th>

<th>Name</th>

<th>Age</th>

<th>Gender</th>

<th>Origin</th>

<th>Destination</th>

<th>Train</th>

<th>Price</th>

<th>Action</th>

</tr>



</thead>





<tbody id="passengerTable">



<!-- Data Comes From app.js -->



</tbody>



</table>





</div>



</div>





<!-- Summary Cards -->


<div class="stats-grid">



<div class="stats-card">

<h2 id="totalPassenger">

0

</h2>

<p>

Total Passengers

</p>

</div>





<div class="stats-card">

<h2 id="avgPrice">

0

</h2>

<p>

Average Ticket Price

</p>

</div>





<div class="stats-card">

<h2 id="highestPrice">

0

</h2>

<p>

Highest Ticket Price

</p>

</div>



</div>





<div id="toast"

class="toast">

</div>





<footer>

© 2026 Passenger Management System

</footer>





<script src="../js/app.js"></script>





<script>



function displayPassengers(){



let passengers =

JSON.parse(

localStorage.getItem("passengers")

) || [];



let table =

document.getElementById("passengerTable");



table.innerHTML="";



if(passengers.length===0){


table.innerHTML=`

<tr>

<td colspan="9"

style="text-align:center;padding:30px;">

No Passenger Records Found

</td>

</tr>

`;



document.getElementById(

"totalPassenger"

).innerText=0;



document.getElementById(

"avgPrice"

).innerText=0;



document.getElementById(

"highestPrice"

).innerText=0;



return;

}





let total=0;

let highest=0;





passengers.forEach((p,index)=>{



total+=Number(p.price);



if(Number(p.price)>highest)

highest=Number(p.price);





table.innerHTML+=`

<tr>

<td>${p.pnr}</td>

<td>${p.name}</td>

<td>${p.age}</td>

<td>${p.gender}</td>

<td>${p.origin}</td>

<td>${p.destination}</td>

<td>${p.train}</td>

<td>₹ ${p.price}</td>


<td>


<button

class="table-btn edit-btn"

onclick="editPassenger(${index})"

>

Edit

</button>



<button

class="table-btn delete-btn"

onclick="deletePassenger(${index})"

>

Delete

</button>



</td>


</tr>

`;



});






document.getElementById(

"totalPassenger"

).innerText

=

passengers.length;





document.getElementById(

"avgPrice"

).innerText

=

"₹ "+

Math.round(

total/passengers.length

);





document.getElementById(

"highestPrice"

).innerText

=

"₹ "+highest;



}







function deletePassenger(index){



let confirmDelete=

confirm(

"Are you sure want to delete?"

);



if(!confirmDelete)

return;





let passengers=

JSON.parse(

localStorage.getItem("passengers")

)||[];



passengers.splice(index,1);





localStorage.setItem(

"passengers",

JSON.stringify(passengers)

);





showToast(

"Passenger Deleted",

"success"

);





displayPassengers();



}







function editPassenger(index){



localStorage.setItem(

"editIndex",

index

);



window.location.href=

"updatePassenger.html";



}





</script>
