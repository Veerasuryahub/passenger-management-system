<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Search Passenger</title>

    <link rel="stylesheet" href="../css/style.css">

</head>


<body onload="checkLogin()">



<nav>

    <div class="logo">

        🚆 PMS

    </div>


    <ul>

        <li>

            <a href="dashboard.html">

                Dashboard

            </a>

        </li>


        <li>

            <a href="addPassenger.html">

                Add

            </a>

        </li>


        <li>

            <a href="viewPassenger.html">

                View

            </a>

        </li>


        <li>

            <a href="searchPassenger.html">

                Search

            </a>

        </li>


        <li>

            <a href="#"

            onclick="logout()">

                Logout

            </a>

        </li>

    </ul>

</nav>






<div class="container">



<div class="card">



<h1 class="title">

US006 - Search Passenger

</h1>



<p class="subtitle">

Search Passenger Using PNR Number

</p>





<div class="search-box">



<input

type="text"

id="searchPNR"

placeholder="Enter PNR Number">




<button

class="btn-primary"

onclick="searchPassenger()">

Search

</button>




<button

class="btn-secondary"

onclick="clearResult()">

Clear

</button>



</div>






<div id="resultArea">



<div class="empty-box">

Passenger Details Will Appear Here

</div>



</div>




</div>





</div>






<div

id="toast"

class="toast">

</div>






<script src="../js/app.js"></script>





<script>



function searchPassenger(){



let pnr=

document

.getElementById(

"searchPNR"

)

.value

.trim();





let passengers=

JSON.parse(

localStorage.getItem(

"passengers"

)

)||[];





let result=

passengers.find(

p=>

p.pnr.toLowerCase()

===

pnr.toLowerCase()

);





let resultArea=

document.getElementById(

"resultArea"

);





if(result){



resultArea.innerHTML=`

<div class="result-card">



<h2>

Passenger Found

</h2>



<div class="result-grid">



<p>

<strong>

PNR :

</strong>

${result.pnr}

</p>





<p>

<strong>

Passenger Name :

</strong>

${result.name}

</p>





<p>

<strong>

Age :

</strong>

${result.age}

</p>





<p>

<strong>

Gender :

</strong>

${result.gender}

</p>





<p>

<strong>

Origin :

</strong>

${result.origin}

</p>





<p>

<strong>

Destination :

</strong>

${result.destination}

</p>





<p>

<strong>

Train Number :

</strong>

${result.train}

</p>





<p>

<strong>

Ticket Price :

</strong>

₹ ${result.price}

</p>



</div>



</div>

`;



showToast(

"Passenger Found",

"success"

);





}else{



resultArea.innerHTML=`

<div class="empty-box">

❌ Passenger Not Found

</div>

`;





showToast(

"Passenger Not Found",

"error"

);



}



}







function clearResult(){



document.getElementById(

"searchPNR"

).value="";





document.getElementById(

"resultArea"

)

.innerHTML=`

<div class="empty-box">

Passenger Details Will Appear Here

</div>

`;



}





</script>



</body>

</html>
