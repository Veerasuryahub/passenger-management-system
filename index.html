<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>

Passenger Management System | Login

</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="login-container">


<div class="login-card">


<h1>

🚆 Passenger Management System

</h1>


<p style="

text-align:center;

color:white;

margin-bottom:25px;

">

Travel Agent Login

</p>



<form

onsubmit="event.preventDefault();login();"

>


<label>

User ID

</label>


<input

type="text"

id="userid"

placeholder="Enter User ID"

required

>

<p style="

color:white;

font-size:13px;

">

Minimum 8 Characters

</p>




<label>

Password

</label>


<div

style="

position:relative;

"

>


<input

type="password"

id="password"

placeholder="Enter Password"

required

>



<i

class="fa-solid fa-eye"

onclick="togglePassword()"

style="

position:absolute;

right:15px;

top:17px;

cursor:pointer;

color:#666;

"

>

</i>


</div>


<p style="

color:white;

font-size:13px;

">

Minimum 10 Characters

<br>

1 Uppercase

<br>

1 Number

<br>

1 Special Character

</p>




<div

style="

display:flex;

justify-content:space-between;

align-items:center;

margin-top:10px;

"

>



<div>

<input

type="checkbox"

id="remember"

onclick="rememberMe()"

style="

width:auto;

"

>



<label

for="remember"

style="

color:white;

margin-left:5px;

"

>

Remember Me

</label>


</div>




<a

href="#"

style="

color:#fff;

font-size:14px;

text-decoration:none;

"

>

Forgot Password?

</a>



</div>





<button

class="btn"

style="

width:100%;

margin-top:25px;

"

>

Login

</button>




<button

type="reset"

class="btn-secondary"

style="

width:100%;

margin-top:15px;

"

>

Reset

</button>



</form>




<div

style="

margin-top:30px;

padding:15px;

border-radius:10px;

background:

rgba(255,255,255,0.15);

"

>



<h3

style="

color:white;

margin-bottom:10px;

"

>

Demo Credentials

</h3>



<p style="color:white;">

<b>

User ID :

</b>

travel123

</p>



<p style="color:white;">

<b>

Password :

</b>

Travel@123

</p>



</div>




<div

id="toast"

class="toast"

>

</div>



</div>



</div>




<script src="js/app.js">

</script>


</body>

</html>
