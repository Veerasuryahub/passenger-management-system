<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Passenger</title>

    <link rel="stylesheet" href="../css/style.css">

</head>


<body onload="checkLogin();loadPassenger()">


    <!-- NAVBAR -->

    <nav>

        <div class="logo">

            🚆 PMS

        </div>

        <ul>

            <li>

                <a href="dashboard.html">

                    Dashboard

                </a>

            </li>


            <li>

                <a href="addPassenger.html">

                    Add

                </a>

            </li>


            <li>

                <a href="viewPassenger.html">

                    View

                </a>

            </li>


            <li>

                <a href="searchPassenger.html">

                    Search

                </a>

            </li>


            <li>

                <a href="#"

                onclick="logout()">

                    Logout

                </a>

            </li>

        </ul>

    </nav>





    <div class="container">



        <div class="card">



            <h1 class="title">

                US003 - Update Passenger

            </h1>


            <p class="subtitle">

                Edit Existing Passenger Details

            </p>




            <form id="updateForm">



                <div class="form-grid">



                    <div class="form-group">

                        <label>

                            PNR Number

                        </label>

                        <input

                        type="text"

                        id="pnr"

                        readonly>

                    </div>





                    <div class="form-group">

                        <label>

                            Passenger Name

                        </label>

                        <input

                        type="text"

                        id="name"

                        required>

                    </div>





                    <div class="form-group">

                        <label>

                            Age

                        </label>

                        <input

                        type="number"

                        id="age"

                        required>

                    </div>





                    <div class="form-group">

                        <label>

                            Gender

                        </label>


                        <select

                        id="gender"

                        required>

                            <option>

                                Male

                            </option>

                            <option>

                                Female

                            </option>

                            <option>

                                Other

                            </option>

                        </select>

                    </div>





                    <div class="form-group">

                        <label>

                            Origin

                        </label>

                        <input

                        type="text"

                        id="origin"

                        required>

                    </div>





                    <div class="form-group">

                        <label>

                            Destination

                        </label>

                        <input

                        type="text"

                        id="destination"

                        required>

                    </div>





                    <div class="form-group">

                        <label>

                            Train Number

                        </label>

                        <input

                        type="text"

                        id="train"

                        required>

                    </div>





                    <div class="form-group">

                        <label>

                            Ticket Price

                        </label>

                        <input

                        type="number"

                        id="price"

                        required>

                    </div>



                </div>





                <div class="btn-group">



                    <button

                    type="submit"

                    class="btn-primary">

                        Update Passenger

                    </button>




                    <button

                    type="button"

                    class="btn-secondary"

                    onclick="window.location.href='viewPassenger.html'">

                        Cancel

                    </button>



                </div>




            </form>



        </div>



    </div>




    <div

    id="toast"

    class="toast">

    </div>





<script src="../js/app.js"></script>



<script>



function loadPassenger(){



let index=

localStorage.getItem(

"editIndex"

);





let passengers=

JSON.parse(

localStorage.getItem(

"passengers"

)

)||[];





let p=

passengers[index];



if(!p){

window.location.href=

"viewPassenger.html";

return;

}





document.getElementById(

"pnr"

).value=p.pnr;





document.getElementById(

"name"

).value=p.name;





document.getElementById(

"age"

).value=p.age;





document.getElementById(

"gender"

).value=p.gender;





document.getElementById(

"origin"

).value=p.origin;





document.getElementById(

"destination"

).value=p.destination;





document.getElementById(

"train"

).value=p.train;





document.getElementById(

"price"

).value=p.price;



}







document

.getElementById(

"updateForm"

)

.addEventListener(

"submit",

function(e){



e.preventDefault();





let index=

localStorage.getItem(

"editIndex"

);





let passengers=

JSON.parse(

localStorage.getItem(

"passengers"

)

)||[];





passengers[index]={



pnr:

document.getElementById(

"pnr"

).value,





name:

document.getElementById(

"name"

).value,





age:

document.getElementById(

"age"

).value,





gender:

document.getElementById(

"gender"

).value,





origin:

document.getElementById(

"origin"

).value,





destination:

document.getElementById(

"destination"

).value,





train:

document.getElementById(

"train"

).value,





price:

document.getElementById(

"price"

).value



};





localStorage.setItem(

"passengers",

JSON.stringify(

passengers

)

);





showToast(

"Passenger Updated Successfully",

"success"

);





setTimeout(()=>{

window.location.href=

"viewPassenger.html";

},1000);





});



</script>



</body>

</html>
