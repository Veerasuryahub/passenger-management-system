<div class="container">



<div class="card">



<h1 class="title">

US004 - Delete Passenger

</h1>



<p class="subtitle">

Delete Passenger Using PNR Number

</p>






<div class="search-box">



<input

type="text"

id="deletePNR"

placeholder="Enter PNR Number">



<button

class="btn"

onclick="findPassengerToDelete()">

Search

</button>



<button

class="btn-secondary"

onclick="clearDelete()">

Clear

</button>




</div>






<div

id="deleteResult"

>





<div class="empty-box">

Passenger Details Will Appear Here

</div>





</div>





</div>





</div>






<div

id="toast"

class="toast">

</div>






<script src="../js/app.js"></script>





<script>




function findPassengerToDelete(){



let pnr=

document

.getElementById(

"deletePNR"

)

.value

.trim();





let passengers=

JSON.parse(

localStorage.getItem(

"passengers"

)

)

||

[];






let passenger=

passengers.find(

p=>

p.pnr

.toUpperCase()

===

pnr

.toUpperCase()

);






let result=

document

.getElementById(

"deleteResult"

);






if(passenger){



result.innerHTML=`

<div class="result-card">



<h2>

Passenger Found

</h2>



<div class="result-grid">



<p>

<strong>

PNR :

</strong>

${passenger.pnr}

</p>




<p>

<strong>

Name :

</strong>

${passenger.name}

</p>




<p>

<strong>

Age :

</strong>

${passenger.age}

</p>




<p>

<strong>

Gender :

</strong>

${passenger.gender}

</p>




<p>

<strong>

Origin :

</strong>

${passenger.origin}

</p>




<p>

<strong>

Destination :

</strong>

${passenger.destination}

</p>




<p>

<strong>

Train :

</strong>

${passenger.train}

</p>




<p>

<strong>

Ticket Price :

</strong>

₹ ${passenger.price}

</p>




</div>






<div

style="

margin-top:30px;

"

>





<button

class="btn-danger"

onclick=

"deletePassenger('${passenger.pnr}')"

>

Delete Passenger

</button>





</div>





</div>

`;



}



else{



result.innerHTML=`

<div class="empty-box">

❌ Passenger Not Found

</div>

`;



showToast(

"Passenger Not Found",

"error"

);



}



}









function deletePassenger(pnr){



let ok=confirm(

"Are you sure want to delete this passenger ?"

);





if(!ok)

return;






let passengers=

JSON.parse(

localStorage.getItem(

"passengers"

)

)

||

[];






passengers=

passengers.filter(

p=>

p.pnr!==pnr

);






localStorage.setItem(

"passengers",

JSON.stringify(passengers)

);






showToast(

"Passenger Deleted Successfully",

"success"

);







document

.getElementById(

"deleteResult"

)

.innerHTML=`

<div class="empty-box">

Passenger Deleted

</div>

`;






document

.getElementById(

"deletePNR"

)

.value="";



}








function clearDelete(){



document

.getElementById(

"deletePNR"

)

.value="";






document

.getElementById(

"deleteResult"

)

.innerHTML=`

<div class="empty-box">

Passenger Details Will Appear Here

</div>

`;



}




</script>





</body>
